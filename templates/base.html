<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QR-GYM{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <header style="display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem; background:var(--prussian-blue); box-shadow:0 2px 8px rgba(7,31,53,0.15);">
        <a href="{{ url_for('inicio') }}" style="display:flex; align-items:center; gap:10px; font-size:20px; font-weight:500; color:var(--white); text-decoration:none;">
            <i class="ti ti-qrcode" style="font-size:28px; color:var(--linen);"></i>QR-GYM
        </a>
        <div style="display:flex; gap:8px; align-items:center;">
            <a href="{{ url_for('inicio') }}" class="nav-btn {% if request.endpoint == 'inicio' %}active{% endif %}"><i class="ti ti-home"></i>Inicio</a>
            <a href="{{ url_for('listar_clientes_html') }}" class="nav-btn {% if request.endpoint == 'listar_clientes_html' %}active{% endif %}"><i class="ti ti-users"></i>Clientes</a>
            <a href="{{ url_for('mostrar_actividad') }}" class="nav-btn {% if request.endpoint == 'mostrar_actividad' %}active{% endif %}"><i class="ti ti-history"></i>Actividad</a>
            <a href="{{ url_for('mostrar_vencimientos') }}" class="nav-btn {% if request.endpoint == 'mostrar_vencimientos' %}active{% endif %}"><i class="ti ti-calendar-event"></i>Vencimientos</a>
            <a href="{{ url_for('mostrar_estadisticas') }}" class="nav-btn {% if request.endpoint == 'mostrar_estadisticas' %}active{% endif %}"><i class="ti ti-chart-bar"></i>Estadísticas</a>
            <a href="{{ url_for('listar_disciplinas') }}" class="nav-btn {% if request.endpoint == 'listar_disciplinas' %}active{% endif %}"><i class="ti ti-tags"></i>Disciplinas</a>
            <a href="{{ url_for('logout') }}" class="nav-btn logout"><i class="ti ti-logout"></i>Salir</a>
        </div>
    </header>

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
