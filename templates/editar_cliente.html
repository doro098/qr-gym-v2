{% extends "base.html" %}

{% block title %}Editar Cliente — QR-GYM{% endblock %}

{% block content %}
    <div class="form-card">
        <h2><i class="ti ti-user-edit" style="color:var(--dusk-blue);"></i>Editar cliente</h2>
        <form method="POST">
            <div class="form-group">
                <label for="nombre"><i class="ti ti-user"></i> Nombre</label>
                <input type="text" id="nombre" name="nombre" value="{{ cliente.nombre }}" required>
            </div>
            <div class="form-group">
                <label for="apellido"><i class="ti ti-user"></i> Apellido</label>
                <input type="text" id="apellido" name="apellido" value="{{ cliente.apellido or '' }}">
            </div>
            <div class="form-group">
                <label for="telefono"><i class="ti ti-phone"></i> Teléfono</label>
                <input type="text" id="telefono" name="telefono" value="{{ cliente.telefono or '' }}">
            </div>
            <div class="form-group">
                <label for="vencimiento"><i class="ti ti-calendar"></i> Vencimiento</label>
                <input type="date" id="vencimiento" name="vencimiento" value="{{ cliente.vencimiento or '' }}">
            </div>

            <div class="form-group">
                <label><i class="ti ti-tags"></i> Disciplinas</label>
                <div style="display:flex; flex-wrap:wrap; gap:10px;">
                    {% for d in disciplinas %}
                    <label style="display:flex; align-items:center; gap:5px; font-weight:normal;">
                        <input type="checkbox" name="disciplinas" value="{{ d.id }}" {% if d.id in disciplinas_cliente %}checked{% endif %}>
                        {{ d.nombre }}
                    </label>
                    {% endfor %}
                </div>
                <small style="color:#999;">Si no selecciona ninguna, el acceso solo dependerá del vencimiento.</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit"><i class="ti ti-device-floppy"></i>Guardar cambios</button>
                <a href="{{ url_for('listar_clientes_html') }}" class="btn-cancel"><i class="ti ti-x"></i>Cancelar</a>
            </div>
        </form>
    </div>
{% endblock %}
